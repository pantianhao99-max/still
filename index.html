<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>静烛</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        --setup-bg-solid: #d4dce5;
        --experience-bg-0: #47607c;
        --experience-bg-1: #6d90ad;
        --experience-bg-2: #c7d9d5;
        --experience-top-glow: rgba(255, 229, 183, 0.2);
        --experience-side-glow: rgba(155, 189, 201, 0.18);
        --experience-depth-shadow: rgba(66, 95, 127, 0.26);
        --experience-core-halo: rgba(255, 237, 204, 0.12);
        --experience-base-shadow: rgba(44, 59, 78, 0.16);
        --experience-sheen: rgba(255, 255, 255, 0.06);
        --experience-mist: rgba(255, 247, 230, 0.05);
        --stage-brightness: 0.9;
        --stage-saturation: 0.98;
        --paper: rgba(244, 248, 249, 0.82);
        --paper-strong: rgba(252, 250, 242, 0.92);
        --ink: #30455d;
        --ink-soft: rgba(48, 69, 93, 0.78);
        --ink-dim: rgba(74, 98, 123, 0.58);
        --line: rgba(70, 99, 129, 0.14);
        --accent: #f3a96e;
        --accent-soft: rgba(243, 169, 110, 0.16);
        --accent-strong: #d97d54;
        --seal: #f0885b;
        --seal-soft: rgba(240, 136, 91, 0.14);
        --ring-circumference: 339.292;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--setup-bg-solid);
        color: var(--ink);
        font-family: "Jost", "Noto Sans SC", ui-sans-serif, system-ui, sans-serif;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: none;
        opacity: 0;
        pointer-events: none;
      }

      body[data-view="experience"] {
        background:
          radial-gradient(circle at 50% 8%, var(--experience-top-glow), transparent 20%),
          radial-gradient(circle at 20% 18%, var(--experience-side-glow), transparent 24%),
          radial-gradient(circle at 80% 78%, var(--experience-depth-shadow), transparent 30%),
          linear-gradient(180deg, var(--experience-bg-2) 0%, var(--experience-bg-1) 42%, var(--experience-bg-0) 100%);
      }

      body[data-view="experience"]::before {
        background:
          radial-gradient(circle at 50% 42%, var(--experience-core-halo), transparent 30%),
          radial-gradient(circle at 50% 80%, var(--experience-base-shadow), transparent 24%);
        opacity: 0.56;
      }

      body[data-view="experience"]::after {
        background:
          linear-gradient(90deg, transparent 0%, var(--experience-sheen) 48%, transparent 100%),
          linear-gradient(180deg, var(--experience-mist), transparent 24%);
        opacity: 0.18;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        background: none;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      #stage {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        filter: contrast(1.01) saturate(var(--stage-saturation)) brightness(var(--stage-brightness));
      }

      #stage:active {
        cursor: default;
      }

      .hud-shell {
        transform: translateY(0);
        gap: 6px;
      }

      .timer {
        font-family: "Jost", "Noto Sans SC", sans-serif;
        font-size: clamp(1.84rem, 4.8vw, 3.8rem);
        font-weight: 500;
        letter-spacing: 0.14em;
        padding-left: 0.16em;
        line-height: 1;
        color: rgba(248, 251, 252, 0.92);
        text-shadow: 0 10px 22px rgba(53, 78, 104, 0.18);
        font-variant-numeric: tabular-nums;
        transition:
          opacity 380ms ease,
          transform 380ms ease,
          text-shadow 380ms ease;
      }

      .altar-mark {
        display: grid;
        gap: 4px;
        justify-items: center;
        color: rgba(237, 246, 248, 0.9);
      }

      .altar-mark strong {
        font-family: "Jost", "Noto Sans SC", sans-serif;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.32em;
        padding-left: 0.48em;
      }

      .altar-mark span {
        font-size: 10px;
        letter-spacing: 0.14em;
        opacity: 0.82;
      }

      .status-chip,
      .hint-chip {
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(249, 248, 242, 0.86), rgba(225, 236, 240, 0.74)),
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.22) 52%, transparent 100%);
        box-shadow:
          0 14px 26px rgba(78, 105, 131, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.34);
        transition:
          opacity 320ms ease,
          transform 320ms ease,
          border-color 320ms ease,
          background 320ms ease;
      }

      .status-chip {
        color: var(--ink-soft);
        min-height: 26px;
        padding: 4px 10px;
      }

      .hint-chip {
        color: rgba(240, 246, 248, 0.88);
        background: transparent;
        border: 0;
        box-shadow: none;
        padding: 0 !important;
        font-size: 12px;
        letter-spacing: 0.02em;
      }

      body[data-view="experience"][data-scene="candle"] {
        background:
          radial-gradient(circle at 50% 8%, rgba(255, 216, 162, 0.12), transparent 15%),
          radial-gradient(circle at 22% 20%, rgba(150, 188, 197, 0.08), transparent 20%),
          radial-gradient(circle at 84% 78%, rgba(62, 84, 118, 0.08), transparent 24%),
          linear-gradient(180deg, #d0d4c9 0%, #89abb1 42%, #4d6d84 100%);
      }

      body[data-view="experience"][data-scene="candle"]::before {
        background:
          radial-gradient(circle at 50% 34%, rgba(255, 234, 196, 0.1), transparent 22%),
          radial-gradient(circle at 50% 82%, rgba(47, 66, 95, 0.16), transparent 24%);
        opacity: 0.54;
      }

      body[data-view="experience"][data-scene="candle"]::after {
        background:
          linear-gradient(90deg, transparent 0%, rgba(255, 244, 229, 0.05) 48%, transparent 100%),
          linear-gradient(180deg, rgba(243, 252, 255, 0.04), transparent 22%);
        opacity: 0.08;
      }

      body[data-view="experience"][data-scene="candle"] .timer,
      body[data-view="experience"][data-scene="candle"] .altar-mark strong,
      body[data-view="experience"][data-scene="candle"] .text-button {
        color: #f5f8f8;
      }

      body[data-view="experience"][data-scene="candle"] .timer {
        text-shadow: 0 12px 24px rgba(37, 58, 84, 0.18);
      }

      body[data-view="experience"][data-scene="candle"] .altar-mark,
      body[data-view="experience"][data-scene="candle"] .hint-chip,
      body[data-view="experience"][data-scene="candle"] .range-meta,
      body[data-view="experience"][data-scene="candle"] .ignite-label {
        color: rgba(241, 247, 248, 0.78);
      }

      body[data-view="experience"][data-scene="candle"] .status-chip,
      body[data-view="experience"][data-scene="candle"] .control-dock,
      body[data-view="experience"][data-scene="candle"] .text-button {
        border-color: rgba(255, 243, 223, 0.12);
        box-shadow:
          0 10px 18px rgba(74, 103, 132, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
      }

      body[data-view="experience"][data-scene="candle"] .status-chip {
        color: rgba(244, 248, 249, 0.94);
        background:
          linear-gradient(180deg, rgba(113, 138, 160, 0.64), rgba(84, 104, 128, 0.58)),
          linear-gradient(90deg, transparent 0%, rgba(255, 245, 223, 0.12) 52%, transparent 100%);
      }

      body[data-view="experience"][data-scene="candle"] .control-dock {
        background:
          linear-gradient(180deg, rgba(104, 128, 147, 0.4), rgba(73, 93, 112, 0.34)),
          linear-gradient(90deg, transparent 0%, rgba(255, 248, 232, 0.14) 52%, transparent 100%);
      }

      body[data-view="experience"][data-scene="candle"] .text-button {
        background:
          linear-gradient(180deg, rgba(88, 121, 151, 0.98), rgba(69, 95, 129, 0.94)),
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.12) 52%, transparent 100%);
        color: rgba(244, 248, 249, 0.96);
      }

      .press-ring {
        position: absolute;
        inset: 50% auto auto 18px;
        width: 34px;
        height: 34px;
        transform: translateY(-50%) scale(0.94);
        opacity: 0;
        transition:
          opacity 260ms ease,
          transform 260ms ease;
        pointer-events: none;
      }

      .press-ring.is-active {
        opacity: 1;
        transform: translateY(-50%) scale(1);
      }

      .press-ring-track {
        fill: none;
        stroke: rgba(138, 106, 74, 0.14);
        stroke-width: 3;
      }

      .press-ring-progress {
        fill: none;
        stroke: rgba(157, 90, 60, 0.86);
        stroke-width: 3.5;
        stroke-linecap: round;
        filter: drop-shadow(0 0 10px rgba(157, 90, 60, 0.18));
        stroke-dasharray: var(--ring-circumference);
        stroke-dashoffset: var(--ring-circumference);
        transition: stroke-dashoffset 50ms linear;
      }

      #interaction-layer {
        position: absolute;
        inset: 0;
        touch-action: none;
        z-index: 1;
      }

      .setup-overlay {
        position: absolute;
        inset: 0;
        z-index: 4;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 28px 20px 24px;
        overflow-y: auto;
        transition:
          opacity 420ms ease,
          transform 420ms ease;
      }

      .setup-panel {
        width: min(680px, calc(100vw - 28px));
        margin: auto;
        padding: 0;
        background: transparent;
        box-shadow: none;
        display: grid;
        gap: 18px;
      }

      .setup-head {
        display: grid;
        gap: 12px;
        justify-items: start;
        text-align: left;
        max-width: 560px;
        margin: 0;
      }

      .setup-copy {
        display: grid;
        gap: 8px;
        max-width: 560px;
      }

      .setup-copy h1 {
        margin: 0;
        font-family: "Jost", "Noto Sans SC", sans-serif;
        font-size: clamp(1.85rem, 3vw, 2.5rem);
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--ink);
      }

      .setup-copy p {
        margin: 0;
        font-size: 13px;
        line-height: 1.7;
        color: var(--ink-dim);
      }

      .setup-section {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid rgba(103, 131, 154, 0.14);
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(246, 249, 248, 0.84), rgba(229, 238, 243, 0.76)),
          linear-gradient(135deg, rgba(255, 255, 255, 0.3), transparent 56%);
        box-shadow:
          0 18px 34px rgba(110, 138, 163, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
      }

      .setup-section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .setup-label {
        font-size: 11px;
        letter-spacing: 0.14em;
        color: rgba(69, 58, 47, 0.54);
      }

      .setup-helper {
        font-size: 11px;
        color: rgba(69, 58, 47, 0.44);
      }

      .scene-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
      }

      .scene-card {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px 12px;
        padding: 12px 14px;
        min-height: 0;
        border-radius: 18px;
        border: 1px solid rgba(103, 131, 154, 0.12);
        background:
          linear-gradient(180deg, rgba(255, 250, 242, 0.86), rgba(226, 237, 241, 0.8)),
          linear-gradient(90deg, rgba(255, 255, 255, 0.26), transparent 60%);
        color: inherit;
        text-align: left;
        transition:
          transform 180ms ease,
          border-color 280ms ease,
          background 280ms ease,
          box-shadow 280ms ease,
          opacity 280ms ease;
        cursor: pointer;
      }

      .scene-card::before {
        display: none;
        content: none;
      }

      .scene-card:hover:not(:disabled),
      .scene-card.is-selected {
        transform: translateY(-1px);
        border-color: rgba(243, 169, 110, 0.28);
        background:
          linear-gradient(180deg, rgba(255, 249, 239, 0.96), rgba(233, 244, 247, 0.9)),
          linear-gradient(90deg, rgba(255, 255, 255, 0.32), transparent 60%);
        box-shadow: 0 14px 28px rgba(96, 126, 152, 0.14);
      }

      .scene-card:disabled {
        opacity: 0.56;
      }

      .scene-card-main {
        min-width: 0;
        display: grid;
        gap: 3px;
      }

      .scene-card-topline {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .scene-card-title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0;
        color: var(--ink);
      }

      .scene-card-subtitle {
        font-size: 11px;
        color: rgba(88, 74, 60, 0.48);
        white-space: nowrap;
      }

      .scene-card-desc {
        font-size: 12px;
        line-height: 1.45;
        color: var(--ink-soft);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .scene-card-badge {
        justify-self: end;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(103, 131, 154, 0.12);
        background: rgba(255, 255, 255, 0.5);
        font-size: 10px;
        letter-spacing: 0;
        color: rgba(80, 104, 129, 0.78);
      }

      .scene-card.is-selected .scene-card-badge {
        border-color: rgba(84, 68, 51, 0.14);
        background: rgba(84, 68, 51, 0.08);
      }

      .scene-card:disabled .scene-card-badge {
        background: transparent;
      }

      .setup-controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 14px;
        align-items: center;
        max-width: none;
        margin: 0;
      }

      .setup-time-shell {
        display: grid;
        gap: 10px;
      }

      .setup-time-preview-wrap {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }

      .setup-time-preview {
        font-family: "Noto Serif SC", serif;
        font-size: clamp(1.8rem, 3.4vw, 2.6rem);
        letter-spacing: 0.12em;
        padding-left: 0.12em;
        color: var(--ink);
      }

      .enter-button,
      .text-button {
        border: 1px solid rgba(98, 128, 153, 0.14);
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(250, 250, 244, 0.92), rgba(225, 236, 241, 0.74)),
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.18) 52%, transparent 100%);
        box-shadow:
          0 12px 22px rgba(81, 110, 138, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
        transition:
          transform 240ms ease,
          border-color 240ms ease,
          background 240ms ease;
      }

      .enter-button:hover,
      .text-button:hover {
        transform: translateY(-1px);
        border-color: rgba(93, 70, 51, 0.24);
      }

      .enter-button:disabled,
      .text-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .enter-button {
        width: 100%;
        height: 50px;
        padding: 0 22px;
        border-radius: 14px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.02em;
        background:
          linear-gradient(180deg, #ffbe82, #eb8f63),
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.16) 52%, transparent 100%);
        color: #fff8f0;
        box-shadow: 0 18px 30px rgba(217, 125, 84, 0.24);
      }

      .experience-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .text-button {
        min-width: 126px;
        height: 40px;
        padding: 0 16px;
        border-radius: 12px;
        font-size: 10px;
        letter-spacing: 0.06em;
      }

      .experience-ui .control-dock {
        width: min(500px, calc(100vw - 30px));
      }

      .hud-wrap {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      .top-hud {
        padding-top: max(10px, env(safe-area-inset-top));
      }

      .bottom-dock {
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }

      body[data-view="setup"] .experience-ui {
        opacity: 0;
        pointer-events: none;
        transform: translateY(14px);
      }

      body[data-view="experience"] .setup-overlay {
        opacity: 0;
        pointer-events: none;
        transform: translateY(18px);
      }

      .control-dock {
        pointer-events: auto;
        width: min(476px, calc(100vw - 30px));
        border: 1px solid rgba(100, 127, 151, 0.14);
        background:
          linear-gradient(180deg, rgba(239, 246, 247, 0.4), rgba(215, 229, 236, 0.24)),
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.22) 52%, transparent 100%);
        backdrop-filter: blur(8px);
        box-shadow:
          0 10px 18px rgba(81, 110, 138, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
      }

      .dock-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
      }

      .range-shell {
        display: grid;
        gap: 8px;
      }

      .range-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 10px;
        letter-spacing: 0.18em;
        color: rgba(69, 58, 47, 0.44);
      }

      .candle-count {
        color: var(--accent);
      }

      .duration-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 44px;
        border-radius: 999px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.28), rgba(109, 144, 173, 0.1)),
          rgba(243, 249, 250, 0.56);
        outline: none;
        border: 1px solid rgba(114, 94, 70, 0.08);
        padding: 0 10px;
      }

      .duration-slider::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(140, 191, 204, 0.48), rgba(240, 166, 111, 0.88));
      }

      .duration-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        margin-top: -7px;
        border-radius: 50%;
        border: 1px solid rgba(114, 94, 70, 0.14);
        background:
          radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.96), rgba(229, 211, 184, 0.96) 58%, rgba(170, 141, 107, 0.95));
        box-shadow: 0 0 0 8px rgba(138, 106, 74, 0.08);
        cursor: ew-resize;
      }

      .duration-slider::-moz-range-track {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(140, 191, 204, 0.48), rgba(240, 166, 111, 0.88));
      }

      .duration-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border: 1px solid rgba(114, 94, 70, 0.14);
        border-radius: 50%;
        background: rgba(222, 205, 180, 1);
        box-shadow: 0 0 0 8px rgba(138, 106, 74, 0.08);
        cursor: ew-resize;
      }

      .ignite-button {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 146px;
        height: 44px;
        padding: 0 16px 0 50px;
        border-radius: 12px;
        border: 1px solid rgba(103, 131, 154, 0.14);
        background:
          linear-gradient(180deg, rgba(94, 131, 168, 0.96), rgba(73, 101, 140, 0.98)),
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.1) 52%, transparent 100%);
        color: #f5fbff;
        box-shadow:
          0 12px 20px rgba(72, 101, 140, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        transition:
          transform 280ms ease,
          border-color 280ms ease,
          background 280ms ease;
        touch-action: none;
      }

      .ignite-button.is-arming {
        transform: scale(0.98);
        border-color: rgba(243, 169, 110, 0.24);
        background:
          linear-gradient(180deg, rgba(108, 147, 183, 0.98), rgba(83, 114, 154, 1)),
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.1) 52%, transparent 100%);
      }

      .ignite-button:disabled,
      .duration-slider:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .ignite-label {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 1px;
        font-size: 10px;
        letter-spacing: 0.04em;
        color: rgba(243, 234, 223, 0.78);
      }

      .ignite-label strong {
        font-family: "Jost", "Noto Sans SC", sans-serif;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #f7efe6;
      }

      body[data-state="idle"] .timer {
        opacity: 0.74;
        transform: translateY(4px) scale(0.98);
      }

      body[data-state="setting"] .timer {

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && appState.state === STATES.BURNING) {
          stopCrackleLoop();
        } else if (!document.hidden && appState.state === STATES.BURNING) {
          startCrackleLoop();
        }
      });

      render();

      function render() {
        const elapsed = clock.getElapsedTime();
        const flicker = appState.state === STATES.BURNING ? perlin1D(permutation, elapsed * 1.9) : 0;
        const glow = appState.state === STATES.BURNING ? 0.34 + flicker * 0.16 : 0.01;

        candleMaterial.uniforms.uTime.value = elapsed;
        candleMaterial.uniforms.uGlow.value = glow;
        flameMaterial.uniforms.uTime.value = elapsed;
        flameMaterial.uniforms.uFlicker.value = 0.68 + flicker * 0.32;
        focusHaloMaterial.opacity = appState.state === STATES.BURNING ? 0.12 + glow * 0.08 : 0.07;
        updateSeaScene(elapsed);
        updateWaxDrips(elapsed);
        updateCaretaker(elapsed);

        if (appState.state === STATES.BURNING) {
          const elapsedBurn = (performance.now() - appState.burningStartedAt) / 1000;
          appState.remainingSeconds = Math.max(appState.totalSeconds - elapsedBurn, 0);
          updateCandleArrangement(Math.max(appState.remainingSeconds / 60, 0.2));
          updateHud();

          const driftX = Math.sin(elapsed * 2.4) * 0.04 * glow;
          const driftZ = Math.cos(elapsed * 2.1) * 0.035 * glow;
          flame.position.set(
            appState.flameAnchor.x + driftX,
            appState.flameAnchor.y + Math.abs(Math.sin(elapsed * 3.2)) * 0.05,
            appState.flameAnchor.z + driftZ
          );

          flame.getWorldPosition(tempLightVector);
          tempLightVector.y += 0.25;
          flameLight.position.copy(tempLightVector);
          flameLight.intensity = 0.38 + flicker * 0.16;
          candleMaterial.uniforms.uLightPos.value.copy(flameLight.position);

          if (appState.remainingSeconds <= 0) {
            finishBurn();
          }
        }

        applyCameraView();
        composer.render();
        requestAnimationFrame(render);
      }

      function onResize() {
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
        updateCamera();
      }

      function renderSceneCards() {
        sceneGridEl.innerHTML = "";

        SCENE_OPTIONS.forEach((sceneOption) => {
          const card = document.createElement("button");
          card.type = "button";
          card.className = `scene-card${sceneOption.id === appState.selectedSceneId ? " is-selected" : ""}`;
          card.dataset.sceneId = sceneOption.id;
          card.disabled = !sceneOption.available;
          card.innerHTML = `
            <div class="scene-card-main">
              <div class="scene-card-topline">
                <div class="scene-card-title">${sceneOption.title}</div>
                <div class="scene-card-subtitle">${sceneOption.subtitle}</div>
              </div>
              <div class="scene-card-desc">${sceneOption.description}</div>
            </div>
            <div class="scene-card-badge">${sceneOption.badge}</div>
          `;

          if (sceneOption.available) {
            card.addEventListener("click", () => {
              appState.selectedSceneId = sceneOption.id;
              renderSceneCards();
            });
          }

          sceneGridEl.appendChild(card);
        });
      }

      function applyExperiencePageTheme(environment) {
        document.documentElement.style.setProperty("--experience-bg-0", environment.pageGradient[0]);
        document.documentElement.style.setProperty("--experience-bg-1", environment.pageGradient[1]);
        document.documentElement.style.setProperty("--experience-bg-2", environment.pageGradient[2]);
        document.documentElement.style.setProperty("--experience-top-glow", environment.topGlow);
        document.documentElement.style.setProperty("--experience-side-glow", environment.sideGlow);
        document.documentElement.style.setProperty("--experience-depth-shadow", environment.depthShadow);
        document.documentElement.style.setProperty("--experience-core-halo", environment.coreHalo);
        document.documentElement.style.setProperty("--experience-base-shadow", environment.baseShadow);
        document.documentElement.style.setProperty("--experience-sheen", environment.sheen);
        document.documentElement.style.setProperty("--experience-mist", environment.mist);
        document.documentElement.style.setProperty("--stage-brightness", String(environment.stageBrightness ?? 0.98));
        document.documentElement.style.setProperty("--stage-saturation", String(environment.stageSaturation ?? 0.9));
      }

      function applyEnvironment(environment) {
        scene.background.set(environment.sceneBackground);
        scene.fog.color.set(environment.fogColor);
        scene.fog.near = environment.fogNear;
        scene.fog.far = environment.fogFar;
        floor.material.color.set(environment.floorColor);
        floor.visible = environment.floorVisible;
        hemiLight.color.set(environment.hemiSky);
        hemiLight.groundColor.set(environment.hemiGround);
        hemiLight.intensity = environment.hemiIntensity;
        keyLight.color.set(environment.keyColor);
        keyLight.intensity = environment.keyIntensity;
        renderer.toneMappingExposure = environment.exposure ?? 0.94;
      }

      function setView(nextView) {
        appState.view = nextView;
        document.body.dataset.view = nextView;
        document.body.dataset.scene = nextView === "experience" ? appState.selectedSceneId : "setup";
        candleWorld.visible = nextView === "experience" && appState.selectedSceneId === "candle";

        if (nextView === "experience") {
          const sceneEnvironment = getSceneEnvironment(appState.selectedSceneId);
          applyExperiencePageTheme(sceneEnvironment);
          applyEnvironment(sceneEnvironment);
        } else {
          document.documentElement.style.setProperty("--stage-brightness", String(SETUP_ENVIRONMENT.stageBrightness));
          document.documentElement.style.setProperty("--stage-saturation", String(SETUP_ENVIRONMENT.stageSaturation));
          applyEnvironment(SETUP_ENVIRONMENT);
        }

        if (nextView === "setup") {
          flame.visible = false;
          flameLight.visible = false;
          flameMaterial.uniforms.uOpacity.value = 0;
          flame.scale.set(0.01, 0.01, 0.01);
        }
      }

      function enterExperience() {
        if (appState.selectedSceneId !== "candle") {
          return;
        }

        clearReturnToIdle();
        flame.visible = false;
        flameLight.visible = false;
        flameLight.intensity = 0;
        flameMaterial.uniforms.uOpacity.value = 0;
        flame.scale.set(0.01, 0.01, 0.01);
        updateCandleArrangement(appState.durationMinutes);
        resetView();
        updateCamera();
        setView("experience");
        setState(STATES.IDLE);
        gsap.fromTo(
          altar.scale,
          { x: 0.94, y: 0.94, z: 0.94 },
          { x: 1, y: 1, z: 1, duration: 0.72, ease: "expo.out" }
        );
      }

      function returnToSetup() {
        cancelHold();
        clearReturnToIdle();

        if (appState.state === STATES.BURNING) {
          stopCrackleLoop();
        }

        flame.visible = false;
        flameLight.visible = false;
        flameLight.intensity = 0;
        flameMaterial.uniforms.uOpacity.value = 0;
        flame.scale.set(0.01, 0.01, 0.01);
        interaction.didIgniteFromHold = false;
        interaction.holdPointerId = null;

        appState.remainingSeconds = appState.durationMinutes * 60;
        appState.totalSeconds = appState.remainingSeconds;
        resetView();
        updateCamera();
        setView("setup");
        setState(STATES.IDLE);
        updateHud();
      }

      function updateCamera() {
        const aspect = window.innerWidth / window.innerHeight;
        const isMobile = window.innerWidth <= 640;
        const isTablet = window.innerWidth <= 900;
        const frustum = isMobile ? 15.4 : isTablet ? 14.8 : 14.4;
        let targetY = 3.9;

        camera.left = (-frustum * aspect) / 2;
        camera.right = (frustum * aspect) / 2;
        camera.top = frustum / 2;
        camera.bottom = -frustum / 2;
        camera.near = -40;
        camera.far = 60;

        if (isMobile) {
          root.position.set(0, -0.38, 0);
          root.scale.setScalar(1.16);
          camera.position.set(9.4, 7.8, 10.7);
          targetY = 1.62;
        } else if (isTablet) {
          root.position.set(0, -0.02, 0);
          root.scale.setScalar(1.14);
          camera.position.set(9.1, 7.9, 10.1);
          targetY = 2.04;
        } else {
          root.position.set(0, 0.28, 0);
          root.scale.setScalar(1.16);
          camera.position.set(8.7, 7.8, 9.2);
          targetY = 2.24;
        }

        cameraRig.target.set(0, targetY, 0);
        tempCameraVector.copy(camera.position).sub(cameraRig.target);
        cameraRig.radius = tempCameraVector.length();
        cameraRig.baseYaw = Math.atan2(tempCameraVector.x, tempCameraVector.z);
        cameraRig.basePitch = Math.atan2(
          tempCameraVector.y,
          Math.hypot(tempCameraVector.x, tempCameraVector.z)
        );

        camera.updateProjectionMatrix();
        applyCameraView(true);
      }

      function resetView() {
        viewState.currentYaw = 0;
        viewState.targetYaw = 0;
        viewState.currentPitch = 0;
        viewState.targetPitch = 0;
      }

      function applyCameraView(immediate = false) {
        const damping = immediate ? 1 : 0.12;
        viewState.currentYaw = THREE.MathUtils.lerp(viewState.currentYaw, viewState.targetYaw, damping);
        viewState.currentPitch = THREE.MathUtils.lerp(viewState.currentPitch, viewState.targetPitch, damping);

        const yaw = cameraRig.baseYaw + viewState.currentYaw;
        const pitch = cameraRig.basePitch + viewState.currentPitch;
        const horizontalRadius = cameraRig.radius * Math.cos(pitch);

        camera.position.set(
          cameraRig.target.x + Math.sin(yaw) * horizontalRadius,
          cameraRig.target.y + Math.sin(pitch) * cameraRig.radius,
          cameraRig.target.z + Math.cos(yaw) * horizontalRadius
        );
        camera.lookAt(cameraRig.target);
      }

      function setState(nextState) {
        appState.state = nextState;
        document.body.dataset.state = nextState.toLowerCase();
        statusEl.textContent = getStateLabel(nextState);

        if (nextState === STATES.IDLE) {
          hintEl.textContent = "长按点燃，双击熄灭。";
        }
        if (nextState === STATES.SETTING) {
          hintEl.textContent = "长按点燃，双击熄灭。";
        }
        if (nextState === STATES.BURNING) {
          hintEl.textContent = "双击熄灭。";
        }
        if (nextState === STATES.FINISHED) {
          hintEl.textContent = "已燃尽，可再次点燃。";
        }

        igniteButtonEl.disabled = nextState === STATES.BURNING;
        returnButtonEl.disabled = nextState === STATES.BURNING;
        enterButtonEl.disabled = appState.selectedSceneId !== "candle";
      }

      function updateHud() {
        const displaySeconds = appState.state === STATES.FINISHED ? 0 : Math.round(appState.remainingSeconds);
        timerEl.textContent = formatTime(displaySeconds);
        durationSliderEl.value = String(Math.round(appState.durationMinutes));
        setupTimePreviewEl.textContent = formatTime(appState.durationMinutes * 60);
        const candles = splitDurationAcrossCandles(appState.durationMinutes).length;
        candleCountEl.textContent = formatCandleCount(candles);
      }

      function scheduleReturnToIdle() {
        clearTimeout(appState.idleReturnHandle);
        appState.idleReturnHandle = window.setTimeout(() => {
          if (appState.state === STATES.SETTING) {
            setState(STATES.IDLE);
          }
        }, 1200);
      }

      function clearReturnToIdle() {
        clearTimeout(appState.idleReturnHandle);
        appState.idleReturnHandle = null;
      }

      function onScenePointerDown(event) {
        if (appState.view !== "experience") {
          return;
        }

        event.preventDefault();

        if (appState.state === STATES.FINISHED) {
          restorePreparedCycle();
        }

        interaction.tapPointerId = event.pointerId;
        interaction.tapStartX = event.clientX;
        interaction.tapStartY = event.clientY;
        interaction.dragPointerId = event.pointerId;
        interaction.dragLastX = event.clientX;
        interaction.dragLastY = event.clientY;
        interaction.dragMoved = false;
        interactionLayer.setPointerCapture(event.pointerId);
      }

      function onScenePointerMove(event) {
        if (appState.view !== "experience" || event.pointerId !== interaction.dragPointerId) {
          return;
        }

        event.preventDefault();

        const dx = event.clientX - interaction.dragLastX;
        const dy = event.clientY - interaction.dragLastY;
        const totalDx = event.clientX - interaction.tapStartX;
        const totalDy = event.clientY - interaction.tapStartY;

        if (!interaction.dragMoved && Math.hypot(totalDx, totalDy) > 12) {
          interaction.dragMoved = true;
        }

        interaction.dragLastX = event.clientX;
        interaction.dragLastY = event.clientY;

        const yawDelta = (dx / Math.max(window.innerWidth, 1)) * 1.6;
        const pitchDelta = (dy / Math.max(window.innerHeight, 1)) * 1.2;

        viewState.targetYaw = THREE.MathUtils.clamp(
          viewState.targetYaw - yawDelta,
          -VIEW_LIMITS.yaw,
          VIEW_LIMITS.yaw
        );
        viewState.targetPitch = THREE.MathUtils.clamp(
          viewState.targetPitch - pitchDelta,
          VIEW_LIMITS.pitchDown,
          VIEW_LIMITS.pitchUp
        );
      }

      function onScenePointerUp(event) {
        if (appState.view !== "experience") {
          return;
        }

        if (event.pointerId !== interaction.tapPointerId) {
          return;
        }

        if (interactionLayer.hasPointerCapture(event.pointerId)) {
          interactionLayer.releasePointerCapture(event.pointerId);
        }

        const dx = event.clientX - interaction.tapStartX;
        const dy = event.clientY - interaction.tapStartY;
        const travel = Math.hypot(dx, dy);
        const now = performance.now();

        if (!interaction.dragMoved && travel < 14) {
          const isDoubleTap =
            now - interaction.lastTapTime < 320 &&
            Math.hypot(event.clientX - interaction.lastTapX, event.clientY - interaction.lastTapY) < 28;

          if (isDoubleTap) {
            resetCycle();
            interaction.lastTapTime = 0;
          } else {
            interaction.lastTapTime = now;
            interaction.lastTapX = event.clientX;
            interaction.lastTapY = event.clientY;
          }
        }

        interaction.tapPointerId = null;
        interaction.dragPointerId = null;
        interaction.dragMoved = false;
      }

      function onScenePointerCancel(event) {
        if (appState.view !== "experience") {
          return;
        }

        if (event.pointerId === interaction.dragPointerId && interactionLayer.hasPointerCapture(event.pointerId)) {
          interactionLayer.releasePointerCapture(event.pointerId);
        }

        if (event.pointerId === interaction.tapPointerId) {
          interaction.tapPointerId = null;
        }

        if (event.pointerId === interaction.dragPointerId) {
          interaction.dragPointerId = null;
          interaction.dragMoved = false;
        }
      }

      function onDurationInput(event) {
        if (appState.view !== "setup" || appState.state === STATES.BURNING) {
          durationSliderEl.value = String(Math.round(appState.durationMinutes));
          return;
        }

        clearReturnToIdle();
        setDurationMinutes(Number(event.target.value));
      }

      function onIgnitePointerDown(event) {
        if (appState.view !== "experience" || appState.state === STATES.BURNING) {
          return;
        }

        event.preventDefault();

        if (appState.state === STATES.FINISHED) {
          restorePreparedCycle();
        }

        ensureAudioContext();
        interaction.holdPointerId = event.pointerId;
        interaction.didIgniteFromHold = false;
        igniteButtonEl.setPointerCapture(event.pointerId);
        beginHold();
      }

      function onIgnitePointerUp(event) {
        if (appState.view !== "experience") {
          return;
        }

        if (event.pointerId !== interaction.holdPointerId) {
          return;
        }

        event.preventDefault();

        if (igniteButtonEl.hasPointerCapture(event.pointerId)) {
          igniteButtonEl.releasePointerCapture(event.pointerId);
        }

        if (!interaction.didIgniteFromHold) {
          cancelHold();
        }

        interaction.holdPointerId = null;
      }

      function beginHold() {
        cancelHold();
        pressRingEl.classList.add("is-active");
        igniteButtonEl.classList.add("is-arming");
        setPressProgress(0);

        interaction.pressTween = gsap.to(interaction, {
          holdProgress: 1,
          duration: HOLD_DURATION,
          ease: "none",
          onUpdate: () => setPressProgress(interaction.holdProgress),
          onComplete: () => {
            if (interaction.holdPointerId !== null && appState.state !== STATES.BURNING) {
              interaction.didIgniteFromHold = true;
              ignite();
            }
          },
        });

        interaction.scaleTween = gsap.to(altar.scale, {
          x: 0.985,
          y: 1.04,
          z: 0.985,
          duration: HOLD_DURATION,
          ease: "power1.inOut",
        });
      }

      function cancelHold() {
        if (interaction.pressTween) {
          interaction.pressTween.kill();
          interaction.pressTween = null;
        }

        if (interaction.scaleTween) {
          interaction.scaleTween.kill();
          interaction.scaleTween = null;
        }

        interaction.holdProgress = 0;
        pressRingEl.classList.remove("is-active");
        igniteButtonEl.classList.remove("is-arming");
        setPressProgress(0);

        gsap.to(altar.scale, {
          x: 1,
          y: 1,
          z: 1,
          duration: 0.32,
          ease: "power2.out",
        });
      }

      function ignite() {
        cancelHold();
        clearReturnToIdle();
        ensureAudioContext();
        interaction.holdPointerId = null;

        flame.visible = true;
        flameLight.visible = true;

        appState.totalSeconds = appState.durationMinutes * 60;
        appState.remainingSeconds = appState.totalSeconds;
        appState.layoutCandleCount = splitDurationAcrossCandles(appState.durationMinutes).length;
        appState.burningStartedAt = performance.now();
        updateCandleArrangement(appState.durationMinutes);

        gsap.set(flame.scale, { x: 0.08, y: 0.08, z: 0.08 });
        gsap.fromTo(
          flameMaterial.uniforms.uOpacity,
          { value: 0 },
          { value: 1, duration: 0.6, ease: "power2.out" }
        );
        gsap.to(flame.scale, {
          x: 0.88,
          y: 1.08,
          z: 0.88,
          duration: 0.82,
          ease: "expo.out",
        });
        gsap.to(altar.scale, {
          x: 1,
          y: 1,
          z: 1,
          duration: 0.72,
          ease: "expo.out",
        });

        playMatchStrike();
        startCrackleLoop();

        if (navigator.vibrate) {
          navigator.vibrate(22);
        }

        setState(STATES.BURNING);
        updateHud();
      }

      function finishBurn() {
        if (appState.state !== STATES.BURNING) {
          return;
        }

        appState.remainingSeconds = 0;
        updateHud();
        stopCrackleLoop();

        gsap.to(flameMaterial.uniforms.uOpacity, {
          value: 0,
          duration: 0.42,
          ease: "power2.out",
        });
        gsap.to(flame.scale, {
          x: 0.03,
          y: 0.03,
          z: 0.03,
          duration: 0.48,
          ease: "power3.in",
          onComplete: () => {
            flame.visible = false;
          },
        });
        gsap.to(flameLight, {
          intensity: 0,
          duration: 0.4,
          ease: "power2.out",
          onComplete: () => {
            flameLight.visible = false;
          },
        });

        setState(STATES.FINISHED);
      }

      function resetCycle() {
        cancelHold();
        clearReturnToIdle();
        stopCrackleLoop();
        interaction.lastTapTime = 0;
        interaction.didIgniteFromHold = false;

        gsap.killTweensOf(flameMaterial.uniforms.uOpacity);
        gsap.killTweensOf(flame.scale);
        gsap.killTweensOf(flameLight);

        flameMaterial.uniforms.uOpacity.value = 0;
        flame.scale.set(0.01, 0.01, 0.01);
        flame.visible = false;
        flameLight.intensity = 0;
        flameLight.visible = false;

        appState.totalSeconds = appState.durationMinutes * 60;
        appState.remainingSeconds = appState.totalSeconds;
        appState.layoutCandleCount = splitDurationAcrossCandles(appState.durationMinutes).length;
        updateCandleArrangement(appState.durationMinutes);
        updateHud();
        setState(STATES.IDLE);
      }

      function restorePreparedCycle() {
        appState.remainingSeconds = appState.durationMinutes * 60;
        appState.totalSeconds = appState.remainingSeconds;
        appState.layoutCandleCount = splitDurationAcrossCandles(appState.durationMinutes).length;
        updateCandleArrangement(appState.durationMinutes);
        updateHud();
        setState(STATES.IDLE);
      }

      function setDurationMinutes(minutes) {
        appState.durationMinutes = clamp(minutes, MIN_MINUTES, MAX_MINUTES);
        appState.totalSeconds = appState.durationMinutes * 60;
        appState.remainingSeconds = appState.totalSeconds;
        appState.layoutCandleCount = splitDurationAcrossCandles(appState.durationMinutes).length;
        updateCandleArrangement(appState.durationMinutes);
        updateHud();

        if (appState.state !== STATES.SETTING) {
          setState(STATES.SETTING);
        }
      }

      function updateCandleArrangement(totalMinutes) {
        const segments = splitDurationAcrossCandles(totalMinutes);
        const lockLayout = appState.state === STATES.BURNING || appState.state === STATES.FINISHED;
        const visibleCount = lockLayout
          ? Math.max(appState.layoutCandleCount, segments.length, 1)
          : Math.max(segments.length, 1);
        const layout = getCandleClusterLayout(visibleCount);
        const activeIndex = segments.length > 0 ? segments.length - 1 : 0;

        appState.visibleCandleCount = visibleCount;
        appState.activeCandleIndex = activeIndex;

        candleUnits.forEach((unit, index) => {
          const isVisible = lockLayout ? index < visibleCount : index < segments.length;
          const pose = layout[index] || layout[layout.length - 1];

          unit.group.visible = isVisible;
          if (!isVisible) {
            return;
          }

          unit.group.position.set(pose.x, 0, pose.z);
          unit.group.rotation.y = pose.rotation || 0;
          unit.group.scale.setScalar(pose.scale);

          const segmentMinutes = segments[index] || 0;
          const height = mapCandleMinutesToHeight(segmentMinutes);
          unit.body.scale.set(1, height, 1);
          unit.body.position.y = BASE_HEIGHT + 1.18 + height * 0.5;

          unit.cap.position.y = BASE_HEIGHT + 1.18 + height + 0.14;
          unit.wick.position.y = BASE_HEIGHT + 1.18 + height + 0.3;
          unit.pool.position.y = BASE_HEIGHT + 0.96;
          unit.cap.visible = segmentMinutes > 0.02;
          unit.wick.visible = segmentMinutes > 0.08;
          unit.accent.visible = false;

          unit.pool.scale.set(
            1 + Math.min(segmentMinutes / CANDLE_CAPACITY_MINUTES, 1) * 0.16,
            1,
            1 + Math.min(segmentMinutes / CANDLE_CAPACITY_MINUTES, 1) * 0.16
          );
        });

        const activeUnit = candleUnits[activeIndex];
        if (activeUnit && segments.length > 0) {
          const scale = activeUnit.group.scale.x;
          appState.flameAnchor.set(
            activeUnit.group.position.x,
            activeUnit.wick.position.y * scale + 0.22 * scale,
            activeUnit.group.position.z
          );
        }

        flame.position.copy(appState.flameAnchor);

        if (appState.state !== STATES.BURNING) {
          flame.getWorldPosition(tempLightVector);
          tempLightVector.y += 0.25;
          flameLight.position.copy(tempLightVector);
          candleMaterial.uniforms.uLightPos.value.copy(flameLight.position);
        }
      }

      function updateWaxDrips(elapsed) {
        const burnRatio = appState.totalSeconds > 0
          ? clamp(1 - appState.remainingSeconds / appState.totalSeconds, 0, 1)
          : 0;
        const shouldShow = appState.view === "experience" && (appState.state === STATES.BURNING || appState.state === STATES.FINISHED);

        candleUnits.forEach((unit, index) => {
          unit.drips.forEach((drip) => {
            if (!shouldShow || !unit.group.visible) {
              drip.group.visible = false;
              return;
            }

            let intensity = 0;
            if (appState.state === STATES.FINISHED) {
              intensity = 0.64;
            } else if (index === appState.activeCandleIndex) {
              intensity = 0.16 + burnRatio * 1.05;
            } else if (index < appState.activeCandleIndex) {
              intensity = 0.42;
            } else {
              intensity = 0.08 + burnRatio * 0.08;
            }

            const extent = Math.max(0, intensity - drip.delay);
            if (extent <= 0.015) {
              drip.group.visible = false;
              return;
            }

            const pulse = Math.sin(elapsed * drip.speed + drip.phase) * 0.04;
            const length = 0.22 + extent * 0.62 + pulse;
            const bead = 0.72 + extent * 0.54 + pulse * 0.4;
            const bodyTop = unit.body.position.y + unit.body.scale.y * 0.5 - drip.topInset;

            drip.group.visible = true;
            drip.group.position.set(drip.x, bodyTop, drip.z);
            drip.stem.scale.set(1, Math.max(0.08, length), 1);
            drip.stem.position.y = -length * 0.2;
            drip.drop.scale.setScalar(Math.max(0.4, bead));
            drip.drop.position.y = -length * 0.42 - 0.05;
          });
        });
      }

      function updateSeaScene(elapsed) {
        const active = appState.view === "experience" && appState.selectedSceneId === "candle";
        seaScene.group.visible = active;
        if (!active) {
          return;
        }

        seaScene.oceanSurfaceA.position.y = -1.48 + Math.sin(elapsed * 0.44) * 0.012;
        seaScene.oceanSurfaceA.rotation.y = Math.PI * 0.08 + Math.sin(elapsed * 0.14) * 0.025;
        seaScene.oceanSurfaceA.scale.set(
          1 + Math.sin(elapsed * 0.36) * 0.008,
          1,
          1 + Math.cos(elapsed * 0.28) * 0.012
        );

        seaScene.oceanSurfaceB.position.y = -1.4 + Math.cos(elapsed * 0.48) * 0.01;
        seaScene.oceanSurfaceB.rotation.y = Math.PI * 0.14 - Math.sin(elapsed * 0.12) * 0.022;
        seaScene.oceanSurfaceB.scale.set(
          1 + Math.cos(elapsed * 0.26) * 0.008,
          1,
          1 + Math.sin(elapsed * 0.24) * 0.008
        );

        seaScene.shoreline.material.opacity = 0.1 + Math.sin(elapsed * 0.6) * 0.012;
        seaScene.outerFoam.material.opacity = 0.06 + Math.cos(elapsed * 0.54) * 0.01;
      }

      function updateCaretaker(elapsed) {
        const active =
          appState.view === "experience" &&
          (appState.state === STATES.BURNING || appState.state === STATES.FINISHED);
        caretaker.group.visible = active;
        if (!active) {
          return;
        }

        const route = caretaker.route;
        const totalSegments = route.length;
        const scaled = ((elapsed * 0.058) % 1) * totalSegments;
        const segmentIndex = Math.floor(scaled) % totalSegments;
        const nextIndex = (segmentIndex + 1) % totalSegments;
        const localT = scaled - segmentIndex;
        const easedT = localT * localT * (3 - 2 * localT);
        const current = route[segmentIndex];
        const next = route[nextIndex];

        caretaker.group.position.set(
          THREE.MathUtils.lerp(current.x, next.x, easedT),
          BASE_HEIGHT + 0.58 + Math.abs(Math.sin(elapsed * 5.8)) * 0.022,
          THREE.MathUtils.lerp(current.z, next.z, easedT)
        );

        tempCaretakerVector.set(next.x - current.x, 0, next.z - current.z);
        caretaker.group.rotation.y = Math.atan2(tempCaretakerVector.x, tempCaretakerVector.z);

        const stride = Math.sin(elapsed * 5.6);
        const choreBlend = Math.max(0, Math.sin(elapsed * 1.34 + 0.8)) * 0.72;

        caretaker.body.rotation.z = stride * 0.04 + choreBlend * 0.08;
        caretaker.head.rotation.y = Math.sin(elapsed * 1.6) * 0.18;
        caretaker.armLeft.rotation.x = stride * 0.55;
        caretaker.armRight.rotation.x = -stride * 0.3 + choreBlend * 0.9;
        caretaker.armRight.rotation.z = -0.18 - choreBlend * 0.22;
        caretaker.legLeft.rotation.x = -stride * 0.48;
        caretaker.legRight.rotation.x = stride * 0.48;
        caretaker.tool.rotation.z = 0.52 + choreBlend * 0.38;
        caretaker.tool.rotation.x = Math.sin(elapsed * 3.2) * 0.08;
      }

      function setPressProgress(progress) {
        const circumference = 339.292;
        pressRingProgressEl.style.strokeDashoffset = `${circumference * (1 - progress)}`;
      }

      function formatTime(seconds) {
        const safeSeconds = Math.max(0, Math.floor(seconds));
        const mins = Math.floor(safeSeconds / 60);
        const secs = safeSeconds % 60;
        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      function getStateLabel(state) {
        if (state === STATES.IDLE) {
          return "静置";
        }
        if (state === STATES.SETTING) {
          return "设定";
        }
        if (state === STATES.BURNING) {
          return "燃烧";
        }
        if (state === STATES.FINISHED) {
          return "燃尽";
        }
        return state;
      }

      function formatCandleCount(count) {
        const numerals = ["零", "一", "二", "三", "四"];
        const prefix = numerals[count] || String(count);
        return `${prefix}炷`;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function mapCandleMinutesToHeight(minutes) {
        if (minutes <= 0) {
          return FINISHED_HEIGHT;
        }

        const t = clamp(minutes, 0, CANDLE_CAPACITY_MINUTES) / CANDLE_CAPACITY_MINUTES;
        return THREE.MathUtils.lerp(FINISHED_HEIGHT, MAX_CANDLE_HEIGHT, Math.pow(t, 0.68));
      }

      function splitDurationAcrossCandles(totalMinutes) {
        const remaining = clamp(totalMinutes, 0, MAX_MINUTES);
        const segments = [];
        let rest = remaining;

        while (rest > 0.0001 && segments.length < MAX_CANDLES) {
          const piece = Math.min(CANDLE_CAPACITY_MINUTES, rest);
          segments.push(piece);
          rest -= piece;
        }

        return segments;
      }

      function getCandleClusterLayout(count) {
        const layouts = {
          1: [{ x: 0, z: 0.04, scale: 0.94, rotation: 0 }],
          2: [
            { x: -0.46, z: 0.08, scale: 0.84, rotation: -0.03 },
            { x: 0.46, z: 0, scale: 0.84, rotation: 0.03 },
          ],
          3: [
            { x: -0.62, z: 0.08, scale: 0.78, rotation: -0.04 },
            { x: 0, z: 0.02, scale: 0.88, rotation: 0 },
            { x: 0.62, z: -0.02, scale: 0.78, rotation: 0.04 },
          ],
          4: [
            { x: -0.82, z: 0.1, scale: 0.72, rotation: -0.05 },
            { x: -0.26, z: 0.02, scale: 0.82, rotation: -0.02 },
            { x: 0.26, z: 0.02, scale: 0.82, rotation: 0.02 },
            { x: 0.82, z: 0.1, scale: 0.72, rotation: 0.05 },
          ],
        };

        return layouts[count] || layouts[1];
      }

      function createCandleUnit(index) {
        const group = new THREE.Group();
        const radius = 0.34 + (index % 2 === 0 ? 0.014 : -0.008);

        const pool = new THREE.Mesh(new THREE.CylinderGeometry(radius * 1.06, radius * 1.16, 0.12, 4), waxPoolMaterial);
        pool.rotation.y = Math.PI * 0.25;
        pool.castShadow = true;
        pool.receiveShadow = true;
        group.add(pool);

        const body = new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.6, radius * 0.72, 1, 4, 1, false), candleMaterial);
        body.rotation.y = Math.PI * 0.25;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);

        const cap = new THREE.Mesh(new THREE.ConeGeometry(radius * 0.4, 0.18, 4), candleMaterial);
        cap.rotation.y = Math.PI * 0.25;
        cap.castShadow = true;
        cap.receiveShadow = true;
        group.add(cap);

        const wick = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.13, 0.035), wickMaterial);
        wick.castShadow = true;
        group.add(wick);

        const accent = new THREE.Mesh(new THREE.BoxGeometry(radius * 0.54, radius * 0.18, radius * 0.54), accentMaterial);
        accent.castShadow = true;
        accent.receiveShadow = true;
        accent.rotation.y = Math.PI * 0.25;
        group.add(accent);

        const dripSeeds = [
          { x: radius * 0.62, z: radius * 0.18, delay: 0.02, phase: 0.4, speed: 2.6, topInset: 0.12 },
          { x: -radius * 0.56, z: -radius * 0.12, delay: 0.18, phase: 1.6, speed: 2.1, topInset: 0.24 },
          { x: radius * 0.18, z: -radius * 0.6, delay: 0.3, phase: 2.4, speed: 2.8, topInset: 0.2 },
        ];
        const drips = dripSeeds.map((seed) => {
          const dripGroup = new THREE.Group();
          dripGroup.visible = false;

          const stem = new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.08, radius * 0.05, 0.32, 5), waxDripMaterial);
          stem.castShadow = true;
          stem.receiveShadow = true;
          dripGroup.add(stem);

          const drop = new THREE.Mesh(new THREE.OctahedronGeometry(radius * 0.13, 0), waxDripMaterial);
          drop.castShadow = true;
          drop.receiveShadow = true;
          dripGroup.add(drop);

          group.add(dripGroup);

          return {
            group: dripGroup,
            stem,
            drop,
            x: seed.x,
            z: seed.z,
            delay: seed.delay,
            phase: seed.phase,
            speed: seed.speed,
            topInset: seed.topInset,
          };
        });

        return { group, pool, body, cap, wick, accent, drips };
      }

      function createCaretaker() {
        const group = new THREE.Group();
        group.scale.setScalar(0.78);

        const body = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.58, 0.3), caretakerBodyMaterial);
        body.position.y = 0.46;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);

        const cloak = new THREE.Mesh(new THREE.ConeGeometry(0.34, 0.78, 4), caretakerCloakMaterial);
        cloak.position.y = 0.34;
        cloak.rotation.y = Math.PI * 0.25;
        cloak.castShadow = true;
        cloak.receiveShadow = true;
        group.add(cloak);

        const head = new THREE.Mesh(new THREE.OctahedronGeometry(0.17, 0), caretakerBodyMaterial);
        head.position.y = 0.88;
        head.castShadow = true;
        head.receiveShadow = true;
        group.add(head);

        const armLeft = new THREE.Group();
        armLeft.position.set(-0.18, 0.6, 0);
        const armLeftMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.42, 0.1), caretakerBodyMaterial);
        armLeftMesh.position.y = -0.18;
        armLeftMesh.castShadow = true;
        armLeftMesh.receiveShadow = true;
        armLeft.add(armLeftMesh);
        group.add(armLeft);

        const armRight = new THREE.Group();
        armRight.position.set(0.18, 0.6, 0);
        const armRightMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.42, 0.1), caretakerBodyMaterial);
        armRightMesh.position.y = -0.18;
        armRightMesh.castShadow = true;
        armRightMesh.receiveShadow = true;
        armRight.add(armRightMesh);
        group.add(armRight);

        const legLeft = new THREE.Group();
        legLeft.position.set(-0.09, 0.22, 0);
        const legLeftMesh = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.36, 0.11), caretakerCloakMaterial);
        legLeftMesh.position.y = -0.14;
        legLeftMesh.castShadow = true;
        legLeftMesh.receiveShadow = true;
        legLeft.add(legLeftMesh);
        group.add(legLeft);

        const legRight = new THREE.Group();
        legRight.position.set(0.09, 0.22, 0);
        const legRightMesh = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.36, 0.11), caretakerCloakMaterial);
        legRightMesh.position.y = -0.14;
        legRightMesh.castShadow = true;
        legRightMesh.receiveShadow = true;
        legRight.add(legRightMesh);
        group.add(legRight);

        const tool = new THREE.Group();
        tool.position.set(0.22, 0.34, 0.02);
        const toolPole = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.76, 0.05), caretakerToolMaterial);
        toolPole.position.y = -0.18;
        toolPole.castShadow = true;
        toolPole.receiveShadow = true;
        tool.add(toolPole);
        const toolHead = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.08, 0.12), accentMaterial);
        toolHead.position.set(0.06, -0.54, 0);
        toolHead.castShadow = true;
        toolHead.receiveShadow = true;
        tool.add(toolHead);
        group.add(tool);

        const shadow = new THREE.Mesh(
          new THREE.CircleGeometry(0.36, 10),
          new THREE.MeshBasicMaterial({ color: 0x183149, transparent: true, opacity: 0.22 })
        );
        shadow.rotation.x = -Math.PI / 2;
        shadow.position.y = 0.01;
        group.add(shadow);

        const route = [
          { x: -0.86, z: 3.28 },
          { x: 0.82, z: 3.28 },
          { x: 0.76, z: 2.56 },
          { x: 0.22, z: 1.92 },
          { x: -0.52, z: 1.98 },
          { x: -0.9, z: 2.6 },
        ];

        return { group, body, head, armLeft, armRight, legLeft, legRight, tool, route };
      }

      function createRoundedBaseGeometry() {
        const geometry = new THREE.CylinderGeometry(BASE_WIDTH * 0.32, BASE_WIDTH * 0.4, BASE_HEIGHT, 6, 1, false);
        geometry.rotateY(Math.PI / 6);
        geometry.translate(0, BASE_HEIGHT * 0.5, 0);
        return geometry;
      }

      function createConcreteTexture(size, normalLike = false) {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;

        const context2d = canvas.getContext("2d");
        const imageData = context2d.createImageData(size, size);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const tone = 120 + Math.floor(Math.random() * 56);
          const speckle = Math.random() > 0.94 ? 30 : 0;
          const value = normalLike ? tone + speckle : tone - speckle;
          data[i] = value;
          data[i + 1] = value;
          data[i + 2] = value;
          data[i + 3] = 255;
        }

        context2d.putImageData(imageData, 0, 0);
        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.NoColorSpace;
        return texture;
      }

      function createPermutationTable(seed) {
        const values = Array.from({ length: 256 }, (_, index) => index);
        let currentSeed = seed >>> 0;

        const random = () => {
          currentSeed = (1664525 * currentSeed + 1013904223) >>> 0;
          return currentSeed / 0xffffffff;
        };

        for (let i = values.length - 1; i > 0; i -= 1) {
          const j = Math.floor(random() * (i + 1));
          [values[i], values[j]] = [values[j], values[i]];
        }

        const table = new Uint16Array(512);
        for (let i = 0; i < 512; i += 1) {
          table[i] = values[i & 255];
        }

        return table;
      }

      function fade(t) {
        return t * t * t * (t * (t * 6 - 15) + 10);
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function grad(hash, x) {
        return (hash & 1) === 0 ? x : -x;
      }

      function perlin1D(table, x) {
        const xi = Math.floor(x) & 255;
        const xf = x - Math.floor(x);
        const u = fade(xf);

        const a = table[xi];
        const b = table[xi + 1];

        const value = lerp(grad(a, xf), grad(b, xf - 1), u);
        return (value + 1) * 0.5;
      }

      function ensureAudioContext() {
        if (!audioContext) {
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtor) {
            return null;
          }

          audioContext = new AudioCtor();
          audioState.master = audioContext.createGain();
          audioState.master.gain.value = 0.38;
          audioState.master.connect(audioContext.destination);
        }

        if (audioContext.state === "suspended") {
          audioContext.resume();
        }

        return audioContext;
      }

      function createNoiseBuffer(durationSeconds) {
        if (!audioContext) {
          return null;
        }

        const sampleCount = Math.floor(audioContext.sampleRate * durationSeconds);
        const buffer = audioContext.createBuffer(1, sampleCount, audioContext.sampleRate);
        const data = buffer.getChannelData(0);

        for (let i = 0; i < sampleCount; i += 1) {
          const falloff = 1 - i / sampleCount;
          data[i] = (Math.random() * 2 - 1) * (0.65 + falloff * 0.35);
        }

        return buffer;
      }

      function playMatchStrike() {
        if (!ensureAudioContext()) {
          return;
        }

        const now = audioContext.currentTime;

        const noiseSource = audioContext.createBufferSource();
        noiseSource.buffer = createNoiseBuffer(0.42);

        const bandpass = audioContext.createBiquadFilter();
        bandpass.type = "bandpass";
        bandpass.frequency.setValueAtTime(2600, now);
        bandpass.frequency.exponentialRampToValueAtTime(760, now + 0.28);
        bandpass.Q.value = 1.2;

        const noiseGain = audioContext.createGain();
        noiseGain.gain.setValueAtTime(0.0001, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.14, now + 0.02);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);

        noiseSource.connect(bandpass).connect(noiseGain).connect(audioState.master);
        noiseSource.start(now);
        noiseSource.stop(now + 0.38);

        const tone = audioContext.createOscillator();
        tone.type = "triangle";
        tone.frequency.setValueAtTime(840, now);
        tone.frequency.exponentialRampToValueAtTime(190, now + 0.34);

        const toneGain = audioContext.createGain();
        toneGain.gain.setValueAtTime(0.0001, now);
        toneGain.gain.exponentialRampToValueAtTime(0.045, now + 0.03);
        toneGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.36);

        tone.connect(toneGain).connect(audioState.master);
        tone.start(now);
        tone.stop(now + 0.38);
      }

      function startCrackleLoop() {
        if (!ensureAudioContext()) {
          return;
        }

        stopCrackleLoop();
        const now = audioContext.currentTime;

        const source = audioContext.createBufferSource();
        source.buffer = createNoiseBuffer(2.4);
        source.loop = true;

        const highpass = audioContext.createBiquadFilter();
        highpass.type = "highpass";
        highpass.frequency.value = 140;

        const lowpass = audioContext.createBiquadFilter();
        lowpass.type = "lowpass";
        lowpass.frequency.value = 1600;

        const gain = audioContext.createGain();
        gain.gain.value = 0.012;

        source.connect(highpass).connect(lowpass).connect(gain).connect(audioState.master);
        source.start(now);

        audioState.crackleSource = source;
        audioState.crackleGain = gain;
        audioState.active = true;
        scheduleCrackleBurst();
      }

      function stopCrackleLoop() {
        audioState.active = false;

        if (audioState.crackleTimer) {
          clearTimeout(audioState.crackleTimer);
          audioState.crackleTimer = null;
        }

        if (audioState.crackleSource) {
          try {
            audioState.crackleSource.stop();
          } catch (error) {
            // noop
          }
          audioState.crackleSource.disconnect();
          audioState.crackleSource = null;
        }

        audioState.crackleGain = null;
      }

      function scheduleCrackleBurst() {
        if (!audioState.active) {
          return;
        }

        const delay = 180 + Math.random() * 520;
        audioState.crackleTimer = window.setTimeout(() => {
          emitCrackleBurst();
          scheduleCrackleBurst();
        }, delay);
      }

      function emitCrackleBurst() {
        if (!audioContext || !audioState.active) {
          return;
        }

        const now = audioContext.currentTime;
        const source = audioContext.createBufferSource();
        source.buffer = createNoiseBuffer(0.09);

        const highpass = audioContext.createBiquadFilter();
        highpass.type = "highpass";
        highpass.frequency.value = 1800 + Math.random() * 2400;

        const gain = audioContext.createGain();
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.028 + Math.random() * 0.035, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);

        source.connect(highpass).connect(gain).connect(audioState.master);
        source.start(now);
        source.stop(now + 0.09);
      }
